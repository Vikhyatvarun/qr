<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>QR Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6fff;
    --accent-glow: rgba(124,111,255,0.35);
    --green: #3dffa0;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }

  #app { height: 100dvh; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px; flex-shrink: 0; z-index: 10; }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
  header h1 span { color: var(--accent); }

  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
    display: inline-block; margin-right: 6px; transition: background 0.3s; }
  #status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

  #torch-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  #torch-btn.on { background: #2a2200; color: #ffd060; border-color: #ffd060; }

  #viewfinder-wrap { flex: 1; position: relative; overflow: hidden; }

  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { display: none; }

  .overlay { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 65% 55% at 50% 50%, transparent 42%, rgba(0,0,0,0.6) 100%); }

  .frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: min(72vw, 260px); aspect-ratio: 1; pointer-events: none; }

  .frame::before, .frame::after, .frame .bl, .frame .br {
    content: ''; position: absolute; width: 22px; height: 22px;
    border-color: var(--accent); border-style: solid; transition: border-color 0.3s; }
  .frame::before  { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .frame::after   { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .frame .bl      { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .frame .br      { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .scanline { position: absolute; left: 4%; right: 4%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 8px var(--accent-glow); animation: scan 1.8s ease-in-out infinite; top: 0; }

  @keyframes scan { 0%{top:6%;opacity:.4} 50%{opacity:1} 100%{top:94%;opacity:.4} }

  .frame.found::before, .frame.found::after, .frame.found .bl, .frame.found .br
    { border-color: var(--green); }
  .frame.found .scanline { background: linear-gradient(90deg,transparent,var(--green),transparent); }

  .hint { position: absolute; bottom: calc(50% - min(36vw,130px) - 40px);
    left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--muted);
    white-space: nowrap; letter-spacing: 0.05em; pointer-events: none; }

  /* debug overlay */
  #debug { position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 3px 8px;
    border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
  #debug.show { opacity: 1; }

  #result-panel { flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border);
    padding: 14px 18px; min-height: 120px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }

  #result-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); }

  #result-text { font-size: 14px; line-height: 1.5; word-break: break-all; color: var(--text);
    flex: 1; min-height: 36px; max-height: 80px; overflow-y: auto; }
  #result-text.empty { color: var(--muted); font-style: italic; font-size: 13px; }
  #result-text a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

  #actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.03em; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; gap: 5px; }
  .btn:active { transform: scale(0.95); opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  #error-msg { position: absolute; inset: 0; display: none; align-items: center;
    justify-content: center; flex-direction: column; gap: 12px; text-align: center;
    padding: 24px; background: var(--bg); z-index: 20; }
  #error-msg.show { display: flex; }
  #error-msg .icon { font-size: 42px; }
  #error-msg p { color: var(--muted); font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1><span id="status-dot"></span>QR<span>·</span>Scan</h1>
    <button id="torch-btn" title="Toggle torch">🔦</button>
  </header>

  <div id="viewfinder-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="overlay"></div>
    <div class="frame" id="frame">
      <div class="bl"></div><div class="br"></div>
      <div class="scanline"></div>
    </div>
    <div class="hint">Point at a QR code</div>
    <div id="debug"></div>

    <div id="error-msg">
      <div class="icon">📷</div>
      <p id="error-text">Camera access needed.<br>Allow permission and reload.</p>
      <button class="btn btn-primary" onclick="location.reload()">Retry</button>
    </div>
  </div>

  <div id="result-panel">
    <div id="result-label">Last scanned</div>
    <div id="result-text" class="empty">Nothing scanned yet</div>
    <div id="actions" style="display:none">
      <button class="btn btn-primary" id="open-btn">🌐 Open</button>
      <button class="btn btn-ghost"   id="copy-btn">📋 Copy</button>
      <button class="btn btn-ghost"   id="clear-btn">✕ Clear</button>
    </div>
  </div>

</div>

<script>
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d', { willReadFrequently: true });
const frame     = document.getElementById('frame');
const resultEl  = document.getElementById('result-text');
const actionsEl = document.getElementById('actions');
const openBtn   = document.getElementById('open-btn');
const copyBtn   = document.getElementById('copy-btn');
const clearBtn  = document.getElementById('clear-btn');
const torchBtn  = document.getElementById('torch-btn');
const errorMsg  = document.getElementById('error-msg');
const errorTxt  = document.getElementById('error-text');
const statusDot = document.getElementById('status-dot');
const debugEl   = document.getElementById('debug');

let lastCode = '';
let track    = null;
let torchOn  = false;
let cooldown = false;
let frameCount = 0;

// Scan at this resolution — small = fast detection
const SCAN_W = 400;
const SCAN_H = 400;

canvas.width  = SCAN_W;
canvas.height = SCAN_H;

async function startCamera() {
  try {
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];

    // Log actual camera settings
    const settings = track.getSettings();
    console.log('Camera:', settings.width + 'x' + settings.height, settings.facingMode);

    statusDot.classList.add('active');
    video.addEventListener('loadedmetadata', () => {
      requestAnimationFrame(tick);
    });
  } catch(e) {
    console.error(e);
    errorTxt.innerHTML = e.name === 'NotAllowedError'
      ? 'Camera permission denied.<br>Allow camera access and reload.'
      : 'Camera error: ' + e.name + '<br>' + e.message;
    errorMsg.classList.add('show');
  }
}

function tick() {
  frameCount++;
  if (video.readyState >= 2) { // HAVE_CURRENT_DATA or better
    // Draw video frame scaled down to SCAN_W x SCAN_H for speed
    ctx.drawImage(video, 0, 0, SCAN_W, SCAN_H);

    const imageData = ctx.getImageData(0, 0, SCAN_W, SCAN_H);

    // Try both inversion modes for reliability
    let code = jsQR(imageData.data, SCAN_W, SCAN_H, { inversionAttempts: 'attemptBoth' });

    if (code && code.data && !cooldown) {
      onFound(code.data);
    }

    // Show FPS every 60 frames
    if (frameCount % 60 === 0) {
      showDebug('Scanning… ' + SCAN_W + 'px');
    }
  }
  requestAnimationFrame(tick);
}

function onFound(data) {
  if (data === lastCode) return;
  lastCode = data;
  cooldown = true;
  setTimeout(() => { cooldown = false; }, 2000);

  showDebug('✓ Found!');
  if (navigator.vibrate) navigator.vibrate([60, 30, 60]);

  // Flash frame green
  frame.classList.remove('found');
  void frame.offsetWidth;
  frame.classList.add('found');
  setTimeout(() => frame.classList.remove('found'), 800);

  // Show result
  resultEl.classList.remove('empty');
  const isURL = /^https?:\/\//i.test(data);
  if (isURL) {
    resultEl.innerHTML = `<a href="${esc(data)}" target="_blank" rel="noopener">${esc(data)}</a>`;
    openBtn.style.display = '';
  } else {
    resultEl.textContent = data;
    openBtn.style.display = 'none';
  }
  actionsEl.style.display = 'flex';
  copyBtn.textContent = '📋 Copy';
}

function showDebug(msg) {
  debugEl.textContent = msg;
  debugEl.classList.add('show');
  clearTimeout(debugEl._t);
  debugEl._t = setTimeout(() => debugEl.classList.remove('show'), 1500);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

openBtn.addEventListener('click', () => window.open(lastCode, '_blank', 'noopener'));

copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(lastCode);
  } catch {
    const ta = Object.assign(document.createElement('textarea'), { value: lastCode });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  copyBtn.textContent = '✓ Copied!';
  setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
});

clearBtn.addEventListener('click', () => {
  lastCode = '';
  resultEl.textContent = 'Nothing scanned yet';
  resultEl.classList.add('empty');
  actionsEl.style.display = 'none';
});

torchBtn.addEventListener('click', async () => {
  if (!track) return;
  const caps = track.getCapabilities?.() || {};
  if (!caps.torch) { showDebug('Torch not supported'); return; }
  torchOn = !torchOn;
  await track.applyConstraints({ advanced: [{ torch: torchOn }] });
  torchBtn.classList.toggle('on', torchOn);
});

startCamera();
</script>
</body>
</html>
